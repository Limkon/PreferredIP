name: 'dns_cf_push'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          
      - name: 'Install dependencies'
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requests" > requirements.txt
            echo "自动生成 requirements.txt 成功"
          fi
          pip install -r requirements.txt
          
      - name: 'Check and Download cfst'
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "最新版本为: $LATEST_VERSION"
          
          CURRENT_VERSION=""
          if [ -f cfst_version.txt ]; then
            CURRENT_VERSION=$(cat cfst_version.txt)
            echo "当前仓库版本为: $CURRENT_VERSION"
          fi
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] || [ ! -f cfst ]; then
            echo "检测到新版本或本地文件缺失，正在下载并更新 cfst..."
            wget -qO cfst.tar.gz "https://github.com/XIU2/CloudflareSpeedTest/releases/download/$LATEST_VERSION/cfst_linux_amd64.tar.gz"
            # 直接解压全部文件，避免以后作者改名导致找不到文件
            tar -zxf cfst.tar.gz
            chmod +x cfst
            echo "$LATEST_VERSION" > cfst_version.txt
            rm cfst.tar.gz
          else
            echo "cfst 已经是最新版，直接使用仓库缓存。"
            chmod +x cfst
          fi
          
      - name: 'Run cfst'
        run: |
          echo "开始进行测速 (预计需要一小段时间)..."
          ./cfst -o result.csv
          
      - name: 'run dnscf'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_DNS_NAME: ${{ secrets.CF_DNS_NAME }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python dnscf.py
        
      - name: 'Commit and push changes'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md requirements.txt cfst cfst_version.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto update preferred IPs and tools" && git push)
