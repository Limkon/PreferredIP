name: 'dns_pod_push'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          
      - name: 'Install dependencies'
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requests" > requirements.txt
            echo "自动生成 requirements.txt 成功"
          fi
          pip install -r requirements.txt
          
      - name: 'Check and Download CloudflareST'
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "最新版本为: $LATEST_VERSION"
          
          CURRENT_VERSION=""
          if [ -f cfst_version.txt ]; then
            CURRENT_VERSION=$(cat cfst_version.txt)
            echo "当前仓库版本为: $CURRENT_VERSION"
          fi
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] || [ ! -f CloudflareST ]; then
            echo "检测到新版本或本地文件缺失，正在下载并更新 CloudflareST..."
            wget -qO cfst.tar.gz "https://github.com/XIU2/CloudflareSpeedTest/releases/download/$LATEST_VERSION/CloudflareST_linux_amd64.tar.gz"
            tar -zxf cfst.tar.gz CloudflareST ip.txt
            chmod +x CloudflareST
            echo "$LATEST_VERSION" > cfst_version.txt
            rm cfst.tar.gz
          else
            echo "CloudflareST 已经是最新版，直接使用仓库缓存。"
            chmod +x CloudflareST
          fi
          
      - name: 'Run CloudflareST'
        run: |
          echo "开始进行测速 (预计需要一小段时间)..."
          ./CloudflareST -o result.csv
          
      - name: 'run dnspod'
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          SUB_DOMAIN: ${{ secrets.SUB_DOMAIN }}
          SECRETID: ${{ secrets.SECRETID }}
          SECRETKEY: ${{ secrets.SECRETKEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python dnspod.py
        
      - name: 'Commit and push changes'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md requirements.txt CloudflareST ip.txt cfst_version.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto update preferred IPs and tools" && git push)
